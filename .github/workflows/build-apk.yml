name: Build JARY APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          if [ -f jaar-jary-app.zip ]; then
            unzip -o jaar-jary-app.zip -d extracted
            SRC="extracted"
            if [ "$(ls extracted | wc -l)" -eq 1 ] && [ -d "extracted/$(ls extracted)" ]; then
              SRC="extracted/$(ls extracted)"
            fi
            cp -rf "$SRC"/. .
            rm -rf extracted
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Add Android platform
        run: npx cap add android

      - name: Patch AndroidManifest for AdMob
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|<application|<application\n        android:usesCleartextTraffic="true"|' "$MANIFEST"
          sed -i 's|</application>|    <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-5606142224218961~5473179910"/>\n    </application>|' "$MANIFEST"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jaar-jary-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
